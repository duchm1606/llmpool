services:
  migrate:
    image: migrate/migrate:v4.19.0
    command:
      [
        "-path=/migrations",
        "-database=postgres://postgres:postgres@postgres:5432/llmpool?sslmode=disable",
        "up",
      ]
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmpool-app
    ports:
      - "8081:8080"
    environment:
      LLMPOOL_SERVER_HOST: 0.0.0.0
      LLMPOOL_SERVER_PORT: 8080
      LLMPOOL_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/llmpool?sslmode=disable
      LLMPOOL_REDIS_ADDR: redis:6379
      LLMPOOL_ORCHESTRATOR_LB_STRATEGY: round-robin
      LLMPOOL_SECURITY_ENCRYPTION_KEY: ${LLMPOOL_SECURITY_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: llmpool-web
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8081
      NEXT_PUBLIC_USE_MOCK_DATA: "false"
    depends_on:
      app:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: llmpool-postgres
    environment:
      POSTGRES_DB: llmpool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llmpool"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: llmpool-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
